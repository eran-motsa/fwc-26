<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="color-scheme" content="dark">
  <title>{% block title %}FIFA World Cup 2026 Agent{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Archivo:wght@600;700;800&family=Noto+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <img class="emblem" src="/static/wc26-logo-2.png" alt="FIFA World Cup 2026" style="border-radius:10px">
      <div>
        <h1>FIFA World Cup <span>2026</span> Agent</h1>
        <div class="tagline">We Are 26 · Betting Advisor</div>
      </div>
    </div>
    <nav class="nav">
      <a href="/" class="{% block nav_today %}{% endblock %}">Today</a>
      <a href="/table" class="{% block nav_table %}{% endblock %}">Table</a>
      <a href="/history" class="{% block nav_history %}{% endblock %}">History</a>
      <a href="/settings" class="{% block nav_settings %}{% endblock %}">Settings</a>
    </nav>
  </header>
  {% block content %}{% endblock %}
</body>
</html>
