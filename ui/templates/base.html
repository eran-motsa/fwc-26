<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="color-scheme" content="dark">
  <title>{% block title %}FIFA World Cup 2026 Agent{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Archivo:wght@600;700;800&family=Noto+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <!-- FIFA WC 2026 emblem — explicit colors, immune to browser dark-mode inversion -->
      <svg class="emblem" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg" style="color-scheme:light dark">
        <defs>
          <linearGradient id="emblem-g" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stop-color="#f0cd5a"/>
            <stop offset="100%" stop-color="#c89b20"/>
          </linearGradient>
        </defs>
        <!-- Background tile -->
        <rect width="64" height="64" rx="13" fill="#0e0e12"/>
        <rect x="1.5" y="1.5" width="61" height="61" rx="12" fill="none" stroke="url(#emblem-g)" stroke-width="1.5"/>
        <!-- Trophy cup -->
        <path d="M24 10h16v8c0 6-3 10-8 10s-8-4-8-10V10z" fill="url(#emblem-g)"/>
        <!-- Handles -->
        <path d="M20 12c-5 0-6 5-2 7" stroke="url(#emblem-g)" stroke-width="2" fill="none" stroke-linecap="round"/>
        <path d="M44 12c5 0 6 5 2 7"  stroke="url(#emblem-g)" stroke-width="2" fill="none" stroke-linecap="round"/>
        <!-- Stem + base -->
        <rect x="30" y="28" width="4" height="7" rx="1" fill="url(#emblem-g)"/>
        <rect x="23" y="35" width="18" height="3" rx="1.5" fill="url(#emblem-g)"/>
        <!-- "26" wordmark -->
        <text x="32" y="54" text-anchor="middle"
              font-family="Arial Black, Arial, sans-serif"
              font-weight="900" font-size="13"
              fill="#f0cd5a" letter-spacing="1.5">26</text>
      </svg>
      <div>
        <h1>FIFA World Cup <span>2026</span> Agent</h1>
        <div class="tagline">We Are 26 · Betting Advisor</div>
      </div>
    </div>
    <nav class="nav">
      <a href="/" class="{% block nav_today %}{% endblock %}">Today</a>
      <a href="/history" class="{% block nav_history %}{% endblock %}">History</a>
      <a href="/settings" class="{% block nav_settings %}{% endblock %}">Settings</a>
    </nav>
  </header>
  {% block content %}{% endblock %}
</body>
</html>
